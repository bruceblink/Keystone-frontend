server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    resolver 127.0.0.11 ipv6=off;

    # 前端 history 路由支持（Vue Router / React Router 等）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Legacy WebParameter 分片上传接口。后端路径本身就是 /api/Flie/**，
    # 这里不能像普通后台 API 一样去掉 /api 前缀。
    location ^~ /api/Flie/ {
        client_max_body_size 256m;
        proxy_pass http://sys_manage_backend:18080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy WebParameter 文件下载兼容路径。
    # Keystone 合并后的文件位于 ${KEYSTONE_FILE_BASE_DIR}/profile/uploads。
    location ^~ /uploads/ {
        alias /app/data/profile/uploads/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 反向代理 API 请求到后端服务（去掉 /api 前缀，保持与本地 Vite 代理一致）
    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://sys_manage_backend:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理 OpenAPI 文档
    location ^~ /v3/ {
        proxy_pass http://sys_manage_backend:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理 Swagger UI
    location ^~ /swagger-ui/ {
        proxy_pass http://sys_manage_backend:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://sys_manage_backend:18080/swagger-ui.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
