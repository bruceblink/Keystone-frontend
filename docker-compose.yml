version: "3.8"

services:
  admin-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: admin-frontend:latest
    container_name: admin-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - keystone_shared

networks:
  keystone_shared:
    external: true
    name: keystone_shared
